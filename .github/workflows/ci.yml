name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Install dependencies
      run: bun install

    - name: Typecheck
      run: bun run typecheck

    - name: Lint
      run: bun run lint

    - name: Build
      run: bun run build

    - name: Verify build output
      run: |
        test -f dist/index.js
        test -d dist/operations
        test -d dist/language-servers
        test -d dist/utils

    - name: Run tests
      run: bun run test

  node-compat:
    runs-on: ubuntu-latest
    needs: test
    strategy:
      matrix:
        node-version: [18.x, 20.x, 22.x]

    steps:
    - uses: actions/checkout@v4

    - name: Setup Bun
      uses: oven-sh/setup-bun@v2

    - name: Setup Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}

    - name: Install dependencies
      run: bun install

    - name: Build
      run: bun run build

    - name: Verify server starts on Node.js ${{ matrix.node-version }}
      run: |
        timeout 10 node dist/index.js &
        SERVER_PID=$!
        sleep 3
        kill $SERVER_PID 2>/dev/null || true
        echo "Server started and stopped successfully on Node.js ${{ matrix.node-version }}"
